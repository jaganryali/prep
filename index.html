<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Interview Prep Board — SDE2 2026</title>
<style>
  :root{
    --bg:#101623; --card:#151D2E; --card2:#111827; --line:#232D42; --line2:#2A3550;
    --txt:#DDE3EE; --txt2:#8B96AC; --dim:#6E7A93; --hi:#F2F5FB;
    --blue:#5B79C7; --green:#4FBF8B; --amber:#E8A93D; --red:#E06C6C;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
  .wrap{max-width:760px;margin:0 auto;padding:20px 14px 60px}
  .eyebrow{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);font-family:ui-monospace,monospace}
  h1{margin:4px 0 2px;font-size:26px;font-weight:700;color:var(--hi)}
  .sub{font-size:13px;color:var(--txt2)}
  .tabs{display:flex;gap:8px;margin:14px 0}
  .tab{flex:1;padding:10px 6px;border-radius:10px;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--txt2);text-align:center}
  .tab.on{border-color:var(--blue);background:#1B2740;color:var(--hi)}
  .tab b{display:block;font-size:15px}
  .tab span{font-size:11px;font-family:ui-monospace,monospace}
  .prog{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:14px}
  .prognums{display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px;font-family:ui-monospace,monospace}
  .bar{height:8px;border-radius:4px;background:var(--line);overflow:hidden;display:flex}
  .bar .g{background:var(--green);transition:width .3s}
  .bar .a{background:var(--amber);transition:width .3s}
  .filters{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
  .chip{padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--line);background:transparent;color:var(--txt2)}
  .chip.on{border-color:var(--blue);background:#1B2740;color:var(--hi)}
  .ghead{width:100%;text-align:left;background:#1B2437;border:1px solid var(--line);border-radius:10px;padding:10px 14px;color:#C9D3E6;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-top:10px}
  .ghead b{font-size:14px}
  .ghead span{font-size:12px;font-family:ui-monospace,monospace;color:var(--dim)}
  .card{background:var(--card);border:1px solid var(--line);border-left:3px solid #3A4763;border-radius:10px;padding:12px 14px;margin:8px 0;transition:opacity .2s}
  .card.done{opacity:.62;border-color:#2C4A3C;border-left-color:var(--green)}
  .card.review{border-color:#4A3D22;border-left-color:var(--amber)}
  .row{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
  .title{color:#E8EDF7;font-weight:600;font-size:14.5px}
  a.title{text-decoration:none;border-bottom:1px dotted var(--blue)}
  .tags{margin-top:5px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .pill{font-size:10.5px;font-family:ui-monospace,monospace;border-radius:4px;padding:1px 6px}
  .pill.co{color:var(--txt2);background:#1E2942}
  .btns{display:flex;gap:6px;flex-shrink:0}
  .btn{width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:15px;border:1px solid var(--line2);background:#182136;color:var(--dim)}
  .btn.don{border-color:var(--green);background:#1D3529;color:var(--green)}
  .btn.rev{border-color:var(--amber);background:#33290F;color:var(--amber)}
  .fu{margin-top:8px;font-size:12.5px;line-height:1.55;color:#9AA6BE;background:var(--card2);border-radius:8px;padding:8px 10px}
  .fu b{color:var(--blue);font-family:ui-monospace,monospace;font-size:11px;font-weight:400}
  .empty{text-align:center;color:var(--dim);padding:40px 0;font-size:14px}
  button:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">SDE2 · 2026 loop</div>
  <h1>Interview Prep Board</h1>
  <div class="sub">160 questions from recent Meta · Amazon · Google · Microsoft loops</div>
  <div class="tabs" id="tabs"></div>
  <div class="prog">
    <div class="prognums">
      <span style="color:var(--green)" id="nDone"></span>
      <span style="color:var(--amber)" id="nRev"></span>
      <span style="color:var(--dim)" id="nLeft"></span>
    </div>
    <div class="bar"><div class="g" id="barG"></div><div class="a" id="barA"></div></div>
  </div>
  <div class="filters" id="filters"></div>
  <div id="list"></div>
</div>
<script>

  // Arrays & Hashing (8)

  { id:"d6", g:"Arrays & Hashing", t:"Subarray Sum Equals K", diff:"Medium", lc:"https://leetcode.com/problems/subarray-sum-equals-k/", co:["Meta","Google"], fu:"Why doesn't sliding window work here? What property of the input breaks it?" },

  { id:"d14", g:"Two Pointers", t:"Merge Sorted Array", diff:"Easy", lc:"https://leetcode.com/problems/merge-sorted-array/", co:["Meta"], fu:"Why merge from the back? What if the arrays are on disk and don't fit in memory?" },

  { id:"d46", g:"Graphs", t:"Making a Large Island", diff:"Hard", lc:"https://leetcode.com/problems/making-a-large-island/", co:["Meta"], fu:"Showed up in a Meta phone screen. How do you avoid double-counting when a flipped cell touches the same island twice?" },

const TABS=[{key:"dsa",label:"DSA",items:dsa,sub:"80 questions"},{key:"lld",label:"LLD",items:lld,sub:"40 designs"},{key:"hld",label:"HLD",items:hld,sub:"40 systems"}];
const FILTERS=[["all","All"],["todo","To do"],["review","\u2691 Review"],["done","\u2713 Done"]];
const diffColor={Easy:"#4FBF8B",Medium:"#E8A93D",Hard:"#E06C6C"};
const KEY="prep160-status-v1";

let status={};
try{status=JSON.parse(localStorage.getItem(KEY)||"{}")}catch(e){status={}}
let tab="dsa", filter="all", closed={};

function save(){try{localStorage.setItem(KEY,JSON.stringify(status))}catch(e){console.error("Could not save progress",e)}}
function toggle(id,val){ if(status[id]===val) delete status[id]; else status[id]=val; save(); render(); }
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

function card(q,isDsa){
  const st=status[q.id];
  const cls="card"+(st===D?" done":st===R?" review":"");
  const bl=isDsa&&!st?`style="border-left-color:${diffColor[q.diff]}"`:"";
  const title=isDsa
    ?`<a class="title" href="${q.lc}" target="_blank" rel="noreferrer">${esc(q.t)} \u2197</a>`
    :`<span class="title">${esc(q.t)}</span>`;
  const diff=isDsa?`<span class="pill" style="color:${diffColor[q.diff]};border:1px solid ${diffColor[q.diff]}44">${q.diff}</span>`:"";
  const cos=q.co.map(c=>`<span class="pill co">${c}</span>`).join("");
  return `<div class="${cls}" ${bl}>
    <div class="row">
      <div style="min-width:0">${title}<div class="tags">${diff}${cos}</div></div>
      <div class="btns">
        <button class="btn ${st===D?"don":""}" aria-label="Mark done" onclick="toggle('${q.id}','${D}')">\u2713</button>
        <button class="btn ${st===R?"rev":""}" aria-label="Mark for review" onclick="toggle('${q.id}','${R}')">\u2691</button>
      </div>
    </div>
    <div class="fu"><b>${isDsa?"INTERVIEWER FOLLOW-UP \u00b7 ":"WHAT THEY PROBE \u00b7 "}</b>${esc(q.fu)}</div>
  </div>`;
}

function render(){
  const active=TABS.find(t=>t.key===tab);
  document.getElementById("tabs").innerHTML=TABS.map(t=>
    `<button class="tab ${t.key===tab?"on":""}" onclick="tab='${t.key}';filter='all';render()"><b>${t.label}</b><span>${t.sub}</span></button>`).join("");
  document.getElementById("filters").innerHTML=FILTERS.map(([k,l])=>
    `<button class="chip ${filter===k?"on":""}" onclick="filter='${k}';render()">${l}</button>`).join("");

  let done=0,rev=0;
  active.items.forEach(q=>{if(status[q.id]===D)done++;if(status[q.id]===R)rev++});
  const total=active.items.length;
  document.getElementById("nDone").textContent=`\u2713 ${done} done`;
  document.getElementById("nRev").textContent=`\u2691 ${rev} to review`;
  document.getElementById("nLeft").textContent=`${total-done-rev} left`;
  document.getElementById("barG").style.width=(done/total*100)+"%";
  document.getElementById("barA").style.width=(rev/total*100)+"%";

  const visible=active.items.filter(q=>{
    if(filter==="done")return status[q.id]===D;
    if(filter==="review")return status[q.id]===R;
    if(filter==="todo")return !status[q.id];
    return true;
  });

  let html="";
  if(tab==="dsa"){
    const groups={};
    visible.forEach(q=>{(groups[q.g]=groups[q.g]||[]).push(q)});
    for(const g in groups){
      const all=active.items.filter(q=>q.g===g);
      const gd=all.filter(q=>status[q.id]===D).length;
      const open=!closed[g];
      html+=`<button class="ghead" onclick="closed['${g.replace(/'/g,"\\'")}']=${open};render()"><b>${g}</b><span>${gd}/${all.length} ${open?"\u25be":"\u25b8"}</span></button>`;
      if(open) html+=groups[g].map(q=>card(q,true)).join("");
    }
  } else {
    html=visible.map(q=>card(q,false)).join("");
  }
  if(!visible.length) html=`<div class="empty">Nothing here yet \u2014 mark questions as done or for review and they'll show up under this filter.</div>`;
  document.getElementById("list").innerHTML=html;
}
render();
</script>
